<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hassan Box Annotator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a40;
    --accent: #00ff88;
    --accent2: #ff3366;
    --accent3: #3366ff;
    --text: #e8e8f0;
    --text-dim: #6666aa;
    --mono: 'Space Mono', monospace;
    --arabic: 'Cairo', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--arabic);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(18,18,26,0.9);
    backdrop-filter: blur(12px);
  }

  .logo { font-family: var(--mono); font-size: 18px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .logo span { color: var(--text-dim); }

  .stats { display: flex; gap: 20px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .stat-item { display: flex; gap: 6px; align-items: center; }
  .stat-val { color: var(--accent); font-weight: 700; }

  .main {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 300px;
    height: calc(100vh - 57px);
  }

  /* ── Canvas Area ── */
  .canvas-area { display: flex; flex-direction: column; position: relative; overflow: hidden; }

  /* Image strip */
  .image-strip {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    min-height: 72px;
    align-items: center;
    flex-shrink: 0;
  }

  .image-strip::-webkit-scrollbar { height: 4px; }
  .image-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .strip-thumb {
    position: relative;
    width: 56px;
    height: 52px;
    border-radius: 6px;
    border: 2px solid var(--border);
    cursor: pointer;
    overflow: hidden;
    flex-shrink: 0;
    transition: border-color 0.2s;
  }

  .strip-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .strip-thumb.active { border-color: var(--accent); }
  .strip-thumb:hover  { border-color: var(--text-dim); }

  .strip-num {
    position: absolute;
    bottom: 2px; right: 3px;
    font-family: var(--mono);
    font-size: 9px;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 0 3px;
    border-radius: 2px;
  }

  .strip-add {
    width: 56px;
    height: 52px;
    border-radius: 6px;
    border: 2px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--text-dim);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .strip-add:hover { border-color: var(--accent); color: var(--accent); }

  /* Canvas center */
  .canvas-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .drop-zone {
    width: 100%;
    height: 100%;
    border: 2px dashed var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(0,255,136,0.03); }
  .drop-zone.hidden { display: none; }

  .drop-icon { font-size: 52px; opacity: 0.3; animation: pulse 2s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(1.05); }
  }

  .drop-text { font-size: 15px; color: var(--text-dim); text-align: center; line-height: 1.8; }
  .drop-text strong { color: var(--accent); display: block; font-size: 18px; margin-bottom: 4px; }

  .file-btn {
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .file-btn:hover { background: var(--accent); color: var(--bg); }

  .canvas-wrapper {
    position: relative;
    display: none;
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: center;
  }

  .canvas-wrapper.visible { display: flex; }

  #canvas {
    max-width: 100%;
    max-height: 100%;
    border-radius: 8px;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
    display: block;
  }

  /* Mode toolbar */
  .mode-toolbar {
    position: absolute;
    top: 12px; right: 12px;
    display: none;
    gap: 6px;
    z-index: 20;
  }

  .mode-toolbar.visible { display: flex; }

  .mode-btn {
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: rgba(18,18,26,0.85);
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,0.1); }

  /* Sidebar */
  .sidebar { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

  .sidebar-section { padding: 20px; border-bottom: 1px solid var(--border); }

  .section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 14px; }

  .label-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 6px; font-family: var(--arabic); font-size: 14px; outline: none; transition: border-color 0.2s; direction: rtl; }
  .label-input:focus { border-color: var(--accent); }

  .color-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

  .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
  .color-swatch.active { border-color: white; transform: scale(1.2); }

  .boxes-list { flex: 1; overflow-y: auto; padding: 12px; }
  .boxes-list::-webkit-scrollbar { width: 4px; }
  .boxes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .box-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .box-item::before { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 3px; background: var(--item-color, var(--accent)); }
  .box-item:hover { border-color: var(--item-color, var(--accent)); }
  .box-item.selected { border-color: var(--item-color, var(--accent)); background: rgba(0,255,136,0.05); }

  .box-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .box-label { font-size: 13px; font-weight: 600; color: var(--text); }
  .box-id { font-family: var(--mono); font-size: 10px; color: var(--text-dim); background: var(--bg); padding: 2px 6px; border-radius: 3px; }
  .box-coords { font-family: var(--mono); font-size: 10px; color: var(--text-dim); line-height: 1.6; }

  .box-delete { position: absolute; top: 8px; left: 8px; background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 3px; transition: all 0.2s; opacity: 0; }
  .box-item:hover .box-delete { opacity: 1; }
  .box-delete:hover { background: var(--accent2); color: white; }

  .empty-state { text-align: center; padding: 32px 16px; color: var(--text-dim); font-size: 13px; line-height: 2; }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

  .actions { padding: 16px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--border); }

  .btn { padding: 11px 16px; border-radius: 6px; font-family: var(--arabic); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }

  .btn-primary  { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { background: #00cc6a; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent3); color: var(--accent3); }
  .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-info { background: transparent; color: var(--accent3); border: 1px solid var(--accent3); }
  .btn-info:hover { background: var(--accent3); color: white; }

  .btn-danger { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
  .btn-danger:hover { background: var(--accent2); color: white; }
  .btn-danger:disabled { opacity: 0.3; cursor: not-allowed; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--accent); color: var(--bg); font-family: var(--mono); font-size: 13px; padding: 12px 24px; border-radius: 6px; transition: transform 0.3s ease; z-index: 1000; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .kbd-hints { display: flex; gap: 10px; flex-wrap: wrap; }
  .kbd-hint { font-family: var(--mono); font-size: 10px; color: var(--text-dim); display: flex; align-items: center; gap: 5px; }
  .kbd { background: var(--bg); border: 1px solid var(--border); padding: 2px 6px; border-radius: 3px; font-size: 10px; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">Hassan Box <span>//</span> Annotation</div>
  <div class="stats">
    <div class="stat-item">صور: <span class="stat-val" id="stat-images">0</span></div>
    <div class="stat-item">صناديق: <span class="stat-val" id="stat-boxes">0</span></div>
    <div class="stat-item">محفوظ: <span class="stat-val" id="stat-saved">0</span></div>
  </div>
</header>

<main class="main">

  <div class="canvas-area" id="canvasArea">

    <!-- Image strip -->
    <div class="image-strip" id="imageStrip">
      <div class="strip-add" id="stripAdd" title="أضف صورة">＋</div>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
    </div>

    <!-- Canvas center -->
    <div class="canvas-center">

      <div class="drop-zone" id="dropZone">
        <div class="drop-icon">📂</div>
        <div class="drop-text">
          <strong>ارفع صورة للبدء</strong>
          اسحب وأفلت هنا · أو اضغط للاختيار
        </div>
        <button class="file-btn" id="chooseBtn">اختر صورة</button>
      </div>

      <div class="canvas-wrapper" id="canvasWrapper">
        <div class="mode-toolbar" id="modeToolbar">
          <button class="mode-btn active" id="modeDrawBtn">✏ رسم</button>
          <button class="mode-btn"        id="modeMoveBtn">✥ تحريك</button>
          <button class="mode-btn"        id="modeResizeBtn">⤡ تعديل</button>
        </div>
        <canvas id="canvas"></canvas>
      </div>

    </div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="section-label">تسمية الصندوق</div>
      <input class="label-input" type="text" id="labelInput" placeholder="مثال: سيارة، شخص، قطة..." value="Object">
      <div class="color-grid" id="colorGrid"></div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">اختصارات</div>
      <div class="kbd-hints">
        <div class="kbd-hint"><span class="kbd">D</span> رسم</div>
        <div class="kbd-hint"><span class="kbd">M</span> تحريك</div>
        <div class="kbd-hint"><span class="kbd">R</span> تعديل</div>
        <div class="kbd-hint"><span class="kbd">Del</span> حذف</div>
        <div class="kbd-hint"><span class="kbd">Z</span> تراجع</div>
        <div class="kbd-hint"><span class="kbd">Esc</span> إلغاء</div>
      </div>
    </div>

    <div class="section-label" style="padding:16px 20px 0; margin-bottom:0;">الصناديق المرسومة</div>

    <div class="boxes-list" id="boxesList">
      <div class="empty-state">
        <div class="icon">◫</div>
        ارفع صورة وابدأ<br>برسم الـ Bounding Boxes
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary"   id="saveBtn"      disabled>💾 حفظ JSON</button>
      <button class="btn btn-info"      id="loadBtn">📂 تحميل مشروع</button>
      <button class="btn btn-secondary" id="exportImgBtn" disabled>🖼 تصدير صورة</button>
      <button class="btn btn-danger"    id="clearBtn"     disabled>🗑 مسح الكل</button>
      <input type="file" id="loadInput" accept=".json" style="display:none">
    </div>
  </aside>
</main>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════ STATE ═══════════════════════ */
const COLORS    = ['#00ff88','#ff3366','#3366ff','#ff9900','#cc44ff','#00ccff','#ffff00','#ff6644'];
const HSIZE     = 8; // handle hit radius in px

let state = {
  // Multi-image support
  images: [],       // [{ id, name, src, naturalW, naturalH, boxes:[] }]
  currentIndex: 0,

  // Current canvas state
  image: null,      // HTMLImageElement
  imageNaturalW: 0,
  imageNaturalH: 0,
  boxes: [],        // boxes for current image

  // Mode: "draw" | "move" | "resize"
  mode: 'draw',

  // Draw
  drawing: false,
  startX: 0, startY: 0,
  currentBox: null,

  // Move
  dragBox: null,
  dragOffX: 0, dragOffY: 0,

  // Resize
  resizeBox: null,
  resizeHandle: '', // 'tl'|'tr'|'bl'|'br'

  selectedId: null,
  currentColor: COLORS[0],
  savedCount: 0,
  nextId: 1,
};

function currentImg() { return state.images[state.currentIndex] || null; }

/* ═══════════════════════ DOM REFS ═══════════════════════ */
const fileInput     = document.getElementById('fileInput');
const chooseBtn     = document.getElementById('chooseBtn');
const dropZone      = document.getElementById('dropZone');
const canvasWrapper = document.getElementById('canvasWrapper');
const canvas        = document.getElementById('canvas');
const ctx           = canvas.getContext('2d');
const labelInput    = document.getElementById('labelInput');
const colorGrid     = document.getElementById('colorGrid');
const boxesList     = document.getElementById('boxesList');
const saveBtn       = document.getElementById('saveBtn');
const loadBtn       = document.getElementById('loadBtn');
const loadInput     = document.getElementById('loadInput');
const exportImgBtn  = document.getElementById('exportImgBtn');
const clearBtn      = document.getElementById('clearBtn');
const toast         = document.getElementById('toast');
const imageStrip    = document.getElementById('imageStrip');
const stripAdd      = document.getElementById('stripAdd');
const modeToolbar   = document.getElementById('modeToolbar');
const modeDrawBtn   = document.getElementById('modeDrawBtn');
const modeMoveBtn   = document.getElementById('modeMoveBtn');
const modeResizeBtn = document.getElementById('modeResizeBtn');

/* ═══════════════════════ COLORS ═══════════════════════ */
COLORS.forEach(c => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch' + (c === state.currentColor ? ' active' : '');
  sw.style.background = c;
  sw.onclick = () => {
    state.currentColor = c;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
  };
  colorGrid.appendChild(sw);
});

/* ═══════════════════════ MODE ═══════════════════════ */
function setMode(m) {
  state.mode = m;
  [modeDrawBtn, modeMoveBtn, modeResizeBtn].forEach(b => b.classList.remove('active'));
  if (m === 'draw')   { modeDrawBtn.classList.add('active');   canvas.style.cursor = 'crosshair'; }
  if (m === 'move')   { modeMoveBtn.classList.add('active');   canvas.style.cursor = 'grab'; }
  if (m === 'resize') { modeResizeBtn.classList.add('active'); canvas.style.cursor = 'nwse-resize'; }
}

modeDrawBtn.onclick   = () => setMode('draw');
modeMoveBtn.onclick   = () => setMode('move');
modeResizeBtn.onclick = () => setMode('resize');

/* ═══════════════════════ FILE HANDLING ═══════════════════════ */
chooseBtn.onclick = (e) => { e.stopPropagation(); fileInput.click(); };
dropZone.onclick  = (e) => { if (e.target !== chooseBtn) fileInput.click(); };
stripAdd.onclick  = () => fileInput.click();

fileInput.onchange = (e) => {
  Array.from(e.target.files).forEach(f => addImageFile(f));
  fileInput.value = '';
};

dropZone.ondragover  = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
dropZone.ondragleave = ()  => dropZone.classList.remove('drag-over');
dropZone.ondrop      = (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')).forEach(f => addImageFile(f));
};

/* ═══════════════════════ ADD IMAGE ═══════════════════════ */
function addImageFile(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    const record = {
      id: Date.now() + Math.random(),
      name: file.name || `image_${state.images.length + 1}.jpg`,
      src: url,
      naturalW: img.naturalWidth,
      naturalH: img.naturalHeight,
      boxes: []
    };
    state.images.push(record);
    const idx = state.images.length - 1;
    addThumb(record, idx);
    switchImage(idx);
    document.getElementById('stat-images').textContent = state.images.length;
    dropZone.classList.add('hidden');
    canvasWrapper.classList.add('visible');
    modeToolbar.classList.add('visible');
  };
  img.onerror = () => showToast('❌ فشل تحميل الصورة');
  img.src = url;
}

function addThumb(record, index) {
  const thumb = document.createElement('div');
  thumb.className = 'strip-thumb';
  thumb.dataset.index = index;
  thumb.innerHTML = `<img src="${record.src}" alt="${record.name}"><div class="strip-num">${index + 1}</div>`;
  thumb.onclick = () => switchImage(index);
  imageStrip.insertBefore(thumb, stripAdd);
}

function switchImage(index) {
  if (index < 0 || index >= state.images.length) return;

  // Save current boxes
  const prev = currentImg();
  if (prev) prev.boxes = state.boxes.map(b => ({ ...b }));

  state.currentIndex = index;
  const rec = currentImg();

  const img = new Image();
  img.onload = () => {
    state.image        = img;
    state.imageNaturalW = rec.naturalW;
    state.imageNaturalH = rec.naturalH;
    state.boxes         = rec.boxes.map(b => ({ ...b }));
    state.selectedId    = null;
    state.currentBox    = null;
    resizeCanvas();
    updateUI();
  };
  img.src = rec.src;

  document.querySelectorAll('.strip-thumb').forEach((t, i) => t.classList.toggle('active', i === index));
}

/* ═══════════════════════ CANVAS RESIZE ═══════════════════════ */
function resizeCanvas() {
  if (!state.image) return;
  const area = document.querySelector('.canvas-center');
  const maxW = area.clientWidth  - 48;
  const maxH = area.clientHeight - 48;
  const ratio = Math.min(maxW / state.imageNaturalW, maxH / state.imageNaturalH);
  canvas.width  = Math.floor(state.imageNaturalW * ratio);
  canvas.height = Math.floor(state.imageNaturalH * ratio);
  render();
}

window.addEventListener('resize', resizeCanvas);

/* ═══════════════════════ CANVAS COORDS ═══════════════════════ */
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width  / rect.width),
    y: (e.clientY - rect.top)  * (canvas.height / rect.height)
  };
}

/* ═══════════════════════ HIT TEST ═══════════════════════ */
function hitHandle(pos, b) {
  const corners = { tl:[b.x,b.y], tr:[b.x+b.w,b.y], bl:[b.x,b.y+b.h], br:[b.x+b.w,b.y+b.h] };
  for (const [k,[cx,cy]] of Object.entries(corners)) {
    if (Math.abs(pos.x-cx) <= HSIZE && Math.abs(pos.y-cy) <= HSIZE) return k;
  }
  return null;
}

function hitBox(pos, b) {
  return pos.x >= b.x && pos.x <= b.x+b.w && pos.y >= b.y && pos.y <= b.y+b.h;
}

function boxAt(pos) {
  for (let i = state.boxes.length-1; i >= 0; i--) {
    if (hitBox(pos, state.boxes[i])) return state.boxes[i];
  }
  return null;
}

/* ═══════════════════════ MOUSE EVENTS ═══════════════════════ */
canvas.addEventListener('mousedown', (e) => {
  if (!state.image) return;
  const pos = getCanvasPos(e);

  if (state.mode === 'draw') {
    state.drawing    = true;
    state.startX     = pos.x;
    state.startY     = pos.y;
    state.currentBox = null;
    state.selectedId = null;

  } else if (state.mode === 'move') {
    const b = boxAt(pos);
    if (b) {
      state.dragBox    = b;
      state.dragOffX   = pos.x - b.x;
      state.dragOffY   = pos.y - b.y;
      state.selectedId = b.id;
      canvas.style.cursor = 'grabbing';
    }

  } else if (state.mode === 'resize') {
    for (let i = state.boxes.length-1; i >= 0; i--) {
      const b = state.boxes[i];
      const h = hitHandle(pos, b);
      if (h) {
        state.resizeBox    = b;
        state.resizeHandle = h;
        state.selectedId   = b.id;
        break;
      }
    }
  }

  render();
});

canvas.addEventListener('mousemove', (e) => {
  const pos = getCanvasPos(e);

  if (state.mode === 'draw' && state.drawing) {
    state.currentBox = {
      x: Math.min(state.startX, pos.x),
      y: Math.min(state.startY, pos.y),
      w: Math.abs(pos.x - state.startX),
      h: Math.abs(pos.y - state.startY),
      color: state.currentColor,
      label: labelInput.value || 'Object'
    };
    render();

  } else if (state.mode === 'move' && state.dragBox) {
    const b = state.dragBox;
    b.x = Math.max(0, Math.min(canvas.width  - b.w, pos.x - state.dragOffX));
    b.y = Math.max(0, Math.min(canvas.height - b.h, pos.y - state.dragOffY));
    render();

  } else if (state.mode === 'resize' && state.resizeBox) {
    const b = state.resizeBox;
    const h = state.resizeHandle;
    const MIN = 10;
    if (h === 'tl') {
      const nx = Math.min(pos.x, b.x+b.w-MIN), ny = Math.min(pos.y, b.y+b.h-MIN);
      b.w += b.x-nx; b.h += b.y-ny; b.x = nx; b.y = ny;
    } else if (h === 'tr') {
      const ny = Math.min(pos.y, b.y+b.h-MIN);
      b.w = Math.max(MIN, pos.x-b.x); b.h += b.y-ny; b.y = ny;
    } else if (h === 'bl') {
      const nx = Math.min(pos.x, b.x+b.w-MIN);
      b.w += b.x-nx; b.x = nx; b.h = Math.max(MIN, pos.y-b.y);
    } else if (h === 'br') {
      b.w = Math.max(MIN, pos.x-b.x); b.h = Math.max(MIN, pos.y-b.y);
    }
    render();

  } else {
    // Cursor hints
    if (state.mode === 'move')   canvas.style.cursor = boxAt(pos) ? 'grab' : 'default';
    if (state.mode === 'resize') {
      let onH = false;
      for (const b of state.boxes) { if (hitHandle(pos,b)) { onH=true; break; } }
      canvas.style.cursor = onH ? 'nwse-resize' : 'default';
    }
  }
});

canvas.addEventListener('mouseup', () => {
  if (state.mode === 'draw' && state.drawing) {
    state.drawing = false;
    if (state.currentBox && state.currentBox.w > 5 && state.currentBox.h > 5) {
      const box = { ...state.currentBox, id: state.nextId++ };
      state.boxes.push(box);
      state.selectedId = box.id;
      updateUI();
    }
    state.currentBox = null;
    render();
  }
  if (state.mode === 'move'   && state.dragBox)   { state.dragBox   = null; canvas.style.cursor = 'grab'; syncBoxes(); renderBoxesList(); }
  if (state.mode === 'resize' && state.resizeBox) { state.resizeBox = null; syncBoxes(); renderBoxesList(); }
});

canvas.addEventListener('mouseleave', () => {
  if (state.mode === 'draw' && state.drawing) {
    state.drawing = false;
    if (state.currentBox && state.currentBox.w > 5 && state.currentBox.h > 5) {
      const box = { ...state.currentBox, id: state.nextId++ };
      state.boxes.push(box);
      state.selectedId = box.id;
      updateUI();
    }
    state.currentBox = null;
    render();
  }
  state.dragBox = state.resizeBox = null;
});

canvas.addEventListener('click', (e) => {
  if (state.mode === 'draw') return;
  const pos = getCanvasPos(e);
  const b = boxAt(pos);
  state.selectedId = b ? b.id : null;
  renderBoxesList();
  render();
});

/* ═══════════════════════ TOUCH ═══════════════════════ */
canvas.addEventListener('touchstart',  (e) => { e.preventDefault(); const t=e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousedown',{clientX:t.clientX,clientY:t.clientY})); }, {passive:false});
canvas.addEventListener('touchmove',   (e) => { e.preventDefault(); const t=e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousemove', {clientX:t.clientX,clientY:t.clientY})); }, {passive:false});
canvas.addEventListener('touchend',    (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup',{})); }, {passive:false});

/* ═══════════════════════ KEYBOARD ═══════════════════════ */
document.addEventListener('keydown', (e) => {
  if (e.target === labelInput) return;
  if ((e.key==='Delete'||e.key==='Backspace') && state.selectedId) {
    state.boxes = state.boxes.filter(b => b.id !== state.selectedId);
    state.selectedId = null; updateUI(); render();
  }
  if (e.key==='z'||e.key==='Z') { state.boxes.pop(); state.selectedId=null; updateUI(); render(); }
  if (e.key==='Escape') { state.drawing=false; state.currentBox=null; state.selectedId=null; render(); }
  if (e.key==='d'||e.key==='D') setMode('draw');
  if (e.key==='m'||e.key==='M') setMode('move');
  if (e.key==='r'||e.key==='R') setMode('resize');
});

/* ═══════════════════════ RENDER ═══════════════════════ */
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (state.image) ctx.drawImage(state.image, 0, 0, canvas.width, canvas.height);

  state.boxes.forEach(box => {
    const isSel = box.id === state.selectedId;

    ctx.strokeStyle = box.color;
    ctx.lineWidth   = isSel ? 3 : 2;
    ctx.setLineDash(isSel ? [6,3] : []);
    ctx.strokeRect(box.x, box.y, box.w, box.h);
    ctx.fillStyle = box.color + '20';
    ctx.fillRect(box.x, box.y, box.w, box.h);
    ctx.setLineDash([]);

    // Label tag
    const label = `#${box.id} ${box.label}`;
    ctx.font = 'bold 12px Cairo, sans-serif';
    const tw = ctx.measureText(label).width;
    const lx = box.x;
    const ly = box.y > 24 ? box.y - 22 : box.y + 4;
    ctx.fillStyle = box.color;
    ctx.fillRect(lx, ly, tw+12, 20);
    ctx.fillStyle = '#0a0a0f';
    ctx.fillText(label, lx+6, ly+14);

    // Handles — shown when selected OR in resize mode
    if (isSel || state.mode === 'resize') {
      [[box.x,box.y],[box.x+box.w,box.y],[box.x,box.y+box.h],[box.x+box.w,box.y+box.h]].forEach(([cx,cy]) => {
        ctx.fillStyle = box.color;
        ctx.fillRect(cx-HSIZE/2, cy-HSIZE/2, HSIZE, HSIZE);
      });
    }
  });

  // In-progress box
  if (state.currentBox) {
    const b = state.currentBox;
    ctx.strokeStyle = state.currentColor;
    ctx.lineWidth   = 2;
    ctx.setLineDash([6,3]);
    ctx.strokeRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = state.currentColor + '15';
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.setLineDash([]);
    const scX = state.imageNaturalW / canvas.width;
    const scY = state.imageNaturalH / canvas.height;
    const info = `${Math.round(b.w*scX)} × ${Math.round(b.h*scY)}`;
    ctx.font = '11px Space Mono, monospace';
    ctx.fillStyle = state.currentColor;
    ctx.fillText(info, b.x+b.w/2-ctx.measureText(info).width/2, b.y+b.h/2);
  }
}

/* ═══════════════════════ SYNC ═══════════════════════ */
function syncBoxes() {
  const rec = currentImg();
  if (rec) rec.boxes = state.boxes.map(b => ({...b}));
}

/* ═══════════════════════ UI ═══════════════════════ */
function updateUI() {
  saveBtn.disabled      = state.images.length === 0;
  exportImgBtn.disabled = !state.image;
  clearBtn.disabled     = state.boxes.length === 0;
  document.getElementById('stat-boxes').textContent = state.boxes.length;
  syncBoxes();
  renderBoxesList();
}

function renderBoxesList() {
  if (state.boxes.length === 0) {
    boxesList.innerHTML = `<div class="empty-state"><div class="icon">◫</div>لا توجد صناديق بعد<br>ارسم على الصورة</div>`;
    return;
  }
  const scX = state.imageNaturalW / canvas.width;
  const scY = state.imageNaturalH / canvas.height;
  boxesList.innerHTML = state.boxes.map(b => `
    <div class="box-item ${b.id===state.selectedId?'selected':''}" style="--item-color:${b.color}" onclick="selectBox(${b.id})">
      <div class="box-item-header">
        <div class="box-label">${b.label}</div>
        <div class="box-id">#${b.id}</div>
      </div>
      <div class="box-coords">x:${Math.round(b.x*scX)} y:${Math.round(b.y*scY)} | w:${Math.round(b.w*scX)} h:${Math.round(b.h*scY)}</div>
      <button class="box-delete" onclick="deleteBox(event,${b.id})">✕</button>
    </div>`).join('');
}

window.selectBox = (id) => { state.selectedId=id; render(); renderBoxesList(); };
window.deleteBox = (e, id) => {
  e.stopPropagation();
  state.boxes = state.boxes.filter(b => b.id !== id);
  if (state.selectedId === id) state.selectedId = null;
  updateUI(); render();
};

/* ═══════════════════════ SAVE JSON (COCO-style) ═══════════════════════ */
saveBtn.onclick = () => {
  syncBoxes();

  // Build images array
  const images = state.images.map((rec, idx) => ({
    id: idx + 1,
    file_name: rec.name,
    width: rec.naturalW,
    height: rec.naturalH
  }));

  // Build annotations array
  let annId = 1;
  const annotations = [];

  state.images.forEach((rec, imgIdx) => {
    // Scale factor for this image (canvas dimensions may differ per image)
    // Boxes are stored in canvas coords; we convert to natural coords at save time
    // Since we always sync before switching, boxes coords are canvas-relative.
    // We store natural coords by re-deriving ratio from record dimensions.
    // Note: canvas size at time of drawing = what matters; we approximate using current canvas if same image.
    const scX = rec.naturalW / canvas.width;
    const scY = rec.naturalH / canvas.height;

    rec.boxes.forEach(box => {
      annotations.push({
        id: annId++,
        image_id: imgIdx + 1,
        category: box.label,
        bbox: [
          Math.round(box.x * scX),
          Math.round(box.y * scY),
          Math.round(box.w * scX),
          Math.round(box.h * scY)
        ],
        color: box.color
      });
    });
  });

  const output = { images, annotations };

  const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'annotations.json';
  a.click();
  URL.revokeObjectURL(url);

  state.savedCount++;
  document.getElementById('stat-saved').textContent = state.savedCount;
  showToast('✓ تم حفظ الـ JSON بنجاح');
};

/* ═══════════════════════ LOAD PROJECT ═══════════════════════ */
loadBtn.onclick     = () => loadInput.click();
loadInput.onchange  = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.images || !data.annotations) throw new Error();
      showToast(`✓ تم قراءة المشروع — ${data.images.length} صور، ${data.annotations.length} صندوق`);
    } catch {
      showToast('❌ ملف JSON غير صالح');
    }
  };
  reader.readAsText(file);
  loadInput.value = '';
};

/* ═══════════════════════ EXPORT IMAGE ═══════════════════════ */
exportImgBtn.onclick = () => {
  if (!state.image) return;
  const tc   = document.createElement('canvas');
  tc.width   = state.imageNaturalW;
  tc.height  = state.imageNaturalH;
  const tctx = tc.getContext('2d');
  tctx.drawImage(state.image, 0, 0);

  const scX = state.imageNaturalW / canvas.width;
  const scY = state.imageNaturalH / canvas.height;

  state.boxes.forEach(box => {
    const bx=box.x*scX, by=box.y*scY, bw=box.w*scX, bh=box.h*scY;
    tctx.strokeStyle = box.color; tctx.lineWidth = 3;
    tctx.strokeRect(bx,by,bw,bh);
    tctx.fillStyle = box.color+'25'; tctx.fillRect(bx,by,bw,bh);
    const label=`#${box.id} ${box.label}`;
    tctx.font='bold 20px Cairo, sans-serif';
    const tw=tctx.measureText(label).width;
    tctx.fillStyle=box.color; tctx.fillRect(bx, by>28?by-28:by, tw+16, 28);
    tctx.fillStyle='#000'; tctx.fillText(label, bx+8, by>28?by-6:by+20);
  });

  tc.toBlob(blob => {
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`annotated_${currentImg()?.name||'image.png'}`;
    a.click(); URL.revokeObjectURL(url);
    showToast('✓ تم تصدير الصورة بنجاح');
  });
};

/* ═══════════════════════ CLEAR ═══════════════════════ */
clearBtn.onclick = () => {
  if (!confirm('هل تريد مسح كل الصناديق في الصورة الحالية؟')) return;
  state.boxes = []; state.selectedId = null;
  syncBoxes(); updateUI(); render();
  showToast('تم مسح كل الصناديق');
};

/* ═══════════════════════ TOAST ═══════════════════════ */
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}
</script>
</body>
</html>
